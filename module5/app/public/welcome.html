<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* ── Checkmark icon ───────────────────────────────────────── */
    .icon {
      width: 64px;
      height: 64px;
      background: #ecfdf5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #059669;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 10px;
      data-cy: "welcome-message"; /* for reference — actual selector is on the element */
    }

    p {
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    a {
      display: inline-block;
      padding: 10px 28px;
      background: #4f46e5;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }

    a:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>

    <!-- data-cy attribute makes this element easy to target in Cypress tests -->
    <h1 data-cy="welcome-message">Welcome, user!</h1>
    <p>You have successfully logged in.<br/>This is your dashboard.</p>

    <a href="/" data-cy="logout-btn">Sign Out</a>
  </div>
</body>
</html>
